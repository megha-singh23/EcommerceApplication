# ===============================
# Server
# ===============================
server.port=8080

# ===============================
# MySQL Datasource
# Update these to match your local MySQL instance.
# Create the database first: CREATE DATABASE ecommerce_db;
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/ecommerce_db?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / Hibernate
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ===============================
# JWT
# jwtSecret should be at least 256 bits (32+ chars) for HS256.
# Override via environment variable in production: ECOMMERCE_APP_JWTSECRET
# ===============================
ecommerce.app.jwtSecret=ChangeThisToALongRandomSecretKeyThatIsAtLeast32CharactersLong
ecommerce.app.jwtExpirationMs=86400000

# ===============================
# Logging
# ===============================
logging.level.com.ecommerce=INFO
logging.level.org.springframework.security=WARN

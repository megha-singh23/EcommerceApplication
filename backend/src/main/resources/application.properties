server.port=${PORT:8080}

spring.datasource.url=jdbc:postgresql://localhost:5432/ecommerce_db
spring.datasource.username=postgres
spring.datasource.password=1234
spring.datasource.driver-class-name=org.postgresql.Driver
# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# JWT
# jwtSecret should be at least 256 bits (32+ chars) for HS256.
ecommerce.app.jwtSecret=meghashakya235@gmail.com_this_is_a_perfect_secret_key
ecommerce.app.jwtExpirationMs=86400000

ecommerce.app.allowedOrigins=http://localhost:3000,http://localhost:5173

logging.level.com.ecommerce=INFO
logging.level.org.springframework.security=WARN
